name: Deploy Web Pages

on:
  workflow_dispatch:
    inputs:
      commit:
        description: Commit, branch, or tag to deploy
        default: main
        required: true

jobs:
  deploy:
    name: Build and deploy web
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.commit || github.ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build Nuxt app
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          command: pages deploy .output/public
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Notice
        run: |
          echo "::notice::Deployed Web Pages from ${{ github.event.inputs.commit || github.ref }}"
